{{/* Setting defaults if they are omitted. */}}
{{- $pxBackupEnabled := .Values.pxbackup.enabled | default false }}
{{- $externalPersistentStorageEnabled := .Values.persistentStorage.enabled | default false }}
{{- $isOpenshiftCluster := or .Values.isOpenshift (.Capabilities.APIVersions.Has "apps.openshift.io/v1") -}}
{{- $mongoCacheSize := int .Values.persistentStorage.mongoCacheSize}}
{{- $azureProxyEnabled := .Values.proxy.azureProxyEnabled | default false }}
{{- if eq $pxBackupEnabled true }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: pxc-backup-mongodb-scripts
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: pxc-backup-mongodb
  {{- include "px-central.labels" . | nindent 4 }}
data:
  setup.sh: |-
    #!/bin/bash
    set -e

    echo "Starting MongoDB setup for pod: $MY_POD_NAME"
    echo "Advertised Hostname: $MONGODB_ADVERTISED_HOSTNAME"

    # Ensure data directory exists
    mkdir -p /data/db
    chmod 755 /data/db 2>/dev/null || true

    # Setup replica set key with proper permissions
    (
        umask 077
        echo "$MONGODB_REPLICA_SET_KEY" > /tmp/replica.key
    )
    chmod 600 /tmp/replica.key 2>/dev/null || true

    # Determine if this is the primary pod
    if [[ "$MY_POD_NAME" = "pxc-backup-mongodb-0" ]]; then
        echo "This is the primary pod"
        IS_PRIMARY=true
    else
        echo "This is a secondary pod"
        IS_PRIMARY=false
    fi

    # Create MongoDB configuration file
    cat > /data/db/mongod.conf <<EOF
    net:
      port: 27017
      bindIp: 0.0.0.0
    replication:
      replSetName: ${MONGODB_REPLICA_SET_NAME}
    security:
      authorization: enabled
      keyFile: /tmp/replica.key
    storage:
      wiredTiger:
        engineConfig:
          cacheSizeGB: ${MONGODB_CACHE_SIZE}
    EOF

    # Check if already fully initialized (both users and replica set)
    if [ -f /data/db/fully_initialized ]; then
        echo "MongoDB already fully initialized, starting normally..."
        exec mongod --config /data/db/mongod.conf
    fi

    if [ "$IS_PRIMARY" = "true" ]; then
        echo "Starting MongoDB as primary..."

        # Check if users need to be created
        if [ ! -f /data/db/users_created ]; then
            echo "First run detected - initializing MongoDB"

            # Start MongoDB without replica set for initial setup
            mongod --bind_ip_all --port 27017 --dbpath /data/db &
            MONGOD_PID=$!

            # Wait for MongoDB to start
            echo "Waiting for MongoDB to start..."
            for i in {1..30}; do
                if mongosh --quiet --eval "db.adminCommand('ping')" > /dev/null 2>&1; then
                    echo "MongoDB is ready"
                    break
                fi
                sleep 2
            done

            # Create root user
            echo "Creating root user..."
            mongosh admin --quiet --eval "db.createUser({user:'root',pwd:'${MONGODB_ROOT_PASSWORD}',roles:[{role:'root',db:'admin'}]})"

            # Create application user if provided
            if [ -n "$MONGODB_USERNAME" ] && [ -n "$MONGODB_PASSWORD" ]; then
                echo "Creating application user..."
                mongosh admin --quiet --eval "db.getSiblingDB('${MONGODB_DATABASE}').createUser({user:'${MONGODB_USERNAME}',pwd:'${MONGODB_PASSWORD}',roles:[{role:'readWrite',db:'${MONGODB_DATABASE}'}]})"
            fi

            # Shutdown MongoDB
            echo "Shutting down MongoDB..."
            mongosh admin --quiet --eval "db.shutdownServer()" || true
            wait $MONGOD_PID 2>/dev/null || true

            # Mark users as created (but not fully initialized yet)
            touch /data/db/users_created
            echo "User creation completed"
        fi

        # Start MongoDB with replica set configuration
        echo "Starting MongoDB with replica set configuration..."
        mongod --config /data/db/mongod.conf &
        MONGOD_PID=$!

        # Wait for MongoDB to start
        echo "Waiting for MongoDB to start..."
        for i in {1..30}; do
            if mongosh admin -u root -p "${MONGODB_ROOT_PASSWORD}" --quiet --eval "db.adminCommand('ping')" > /dev/null 2>&1; then
                echo "MongoDB is ready"
                break
            fi
            sleep 2
        done

        # Check if replica set is already initialized
        if ! mongosh admin -u root -p "${MONGODB_ROOT_PASSWORD}" --quiet --eval "rs.status()" > /dev/null 2>&1; then
            echo "Initializing replica set..."

            # Wait for other pods to be ready (not just DNS resolution)
            echo "Waiting for other MongoDB pods to be ready..."
            for i in 1 2; do
                echo "Waiting for pxc-backup-mongodb-$i to be ready..."
                timeout=300  # 5 minutes timeout
                count=0
                while [ $count -lt $timeout ]; do
                    # Check if pod is ready by trying to connect to MongoDB
                    if mongosh --host "pxc-backup-mongodb-$i.pxc-backup-mongodb-headless:27017" --quiet --eval "db.adminCommand('ping')" > /dev/null 2>&1; then
                        echo "pxc-backup-mongodb-$i is ready"
                        break
                    fi
                    count=$((count + 1))
                    sleep 5
                done

                if [ $count -eq $timeout ]; then
                    echo "Error: Timeout waiting for pxc-backup-mongodb-$i to be ready"
                    exit 1
                fi
            done

            # Initialize replica set with retries
            echo "All pods ready, initializing replica set..."
            for attempt in 1 2 3; do
                echo "Replica set initialization attempt $attempt..."
                if mongosh admin -u root -p "${MONGODB_ROOT_PASSWORD}" --eval "
                    rs.initiate({
                        _id: '${MONGODB_REPLICA_SET_NAME}',
                        members: [
                            { _id: 0, host: 'pxc-backup-mongodb-0.pxc-backup-mongodb-headless:27017' },
                            { _id: 1, host: 'pxc-backup-mongodb-1.pxc-backup-mongodb-headless:27017' },
                            { _id: 2, host: 'pxc-backup-mongodb-2.pxc-backup-mongodb-headless:27017' }
                        ]
                    })
                " 2>&1; then
                    echo "Replica set initialization successful"
                    break
                else
                    echo "Replica set initialization attempt $attempt failed"
                    if [ $attempt -eq 3 ]; then
                        echo "All replica set initialization attempts failed"
                        exit 1
                    fi
                    sleep 10
                fi
            done

            echo "Replica set initialization completed"

            # Mark as fully initialized only after successful replica set setup
            touch /data/db/fully_initialized
            echo "MongoDB fully initialized"
        else
            echo "Replica set already initialized"
            touch /data/db/fully_initialized
        fi

        # Keep MongoDB running
        wait $MONGOD_PID
    else
        # Secondary node - just start MongoDB
        echo "Starting MongoDB as secondary..."
        exec mongod --config /data/db/mongod.conf
    fi
---
apiVersion: v1
kind: Service
metadata:
  name: pxc-backup-mongodb-headless
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: pxc-backup-mongodb
{{- include "px-central.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
  selector:
    app.kubernetes.io/component: pxc-backup-mongodb
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pxc-backup-mongodb
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: pxc-backup-mongodb
{{- include "px-central.labels" . | nindent 4 }}
secrets:
  - name: pxc-backup-mongodb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pxc-backup-mongodb
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: pxc-backup-mongodb
{{- include "px-central.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{.Release.Name }}
      app.kubernetes.io/instance: {{.Release.Name }}
      app.kubernetes.io/managed-by: {{.Release.Service }}
      app.kubernetes.io/component: pxc-backup-mongodb
  serviceName: pxc-backup-mongodb-headless
  podManagementPolicy: Parallel
  replicas: 3
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      {{- if and (eq $azureProxyEnabled true) (not (has "pxc-backup-mongodb" .Values.proxy.excludeAzureProxyList)) }}
      annotations:
        kubernetes.azure.com/no-http-proxy-vars: "true"
      {{- end }}
      labels:
        app.kubernetes.io/name: {{.Release.Name }}
        app.kubernetes.io/instance: {{.Release.Name }}
        app.kubernetes.io/managed-by: {{.Release.Service }}
        app.kubernetes.io/component: pxc-backup-mongodb
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              {{- if .Values.nodeAffinityLabel }}
              - key: {{ .Values.nodeAffinityLabel }}
                operator: Exists
              {{- else }}
              - key: pxbackup/enabled
                operator: NotIn
                values:
                - "false"
              {{- end }}
        podAntiAffinity:
          {{- if eq .Values.podAntiAffinity true }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                  - pxc-backup-mongodb
              topologyKey: kubernetes.io/hostname
          {{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                    - pxc-backup-mongodb
                topologyKey: kubernetes.io/hostname
          {{- end }}
      {{- if eq .Values.storkRequired true }}
      schedulerName: stork
      {{- end }}
      {{- if .Values.images.pullSecrets }}
      imagePullSecrets:
        {{- range $sec := .Values.images.pullSecrets }}
        - name: {{ $sec | quote }}
        {{- end }}
      {{- end }}
      serviceAccountName: pxc-backup-mongodb
      {{- if $isOpenshiftCluster}}
      {{- else }}
      securityContext:
{{ toYaml .Values.securityContext | indent 8 }}
      {{- end }}
      containers:
        - name: mongodb
          image: {{ printf "%s/%s/%s:%s" (default .Values.images.mongodbImage.registry .Values.images.registry) (default .Values.images.mongodbImage.repo .Values.images.repo) .Values.images.mongodbImage.imageName .Values.images.mongodbImage.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /scripts/setup.sh

          env:

          {{- include "serviceMesh.env" . | nindent 12 }}
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: K8S_SERVICE_NAME
              value: pxc-backup-mongodb-headless
            - name: MONGODB_REPLICA_SET_NAME
              value: rs0
            - name: MONGODB_ADVERTISED_HOSTNAME
              value: $(MY_POD_NAME).$(K8S_SERVICE_NAME)
            - name: MONGODB_DATA_DIR
              value: /data/db
            - name: MONGODB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: pxc-backup-mongodb
                  key: mongodb-username
            - name: MONGODB_DATABASE
              value: px-backup
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pxc-backup-mongodb
                  key: mongodb-password
            - name: MONGODB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pxc-backup-mongodb
                  key: mongodb-root-password
            - name: MONGODB_REPLICA_SET_KEY
              valueFrom:
                secretKeyRef:
                  name: pxc-backup-mongodb
                  key: mongodb-replica-set-key
            - name: MONGODB_CACHE_SIZE
              value: "{{ $mongoCacheSize }}"

            {{- if or (empty .Values.proxy.includeNoProxyList) (has "pxc-backup-mongodb" .Values.proxy.includeNoProxyList) }}
            {{- include "proxy.proxyEnv" . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: 27017
              name: mongodb
              protocol: TCP
          # Simple liveness probe
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - |
                  mongosh --quiet --eval 'db.adminCommand("ping")' || exit 1
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          # Readiness probe - check if MongoDB is ready and part of replica set
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - |
                  # Check if MongoDB is responding
                  if ! mongosh --quiet --eval 'db.adminCommand("ping")' > /dev/null 2>&1; then
                    exit 1
                  fi

                  # For primary pod, check if it's primary or secondary
                  if [ "$MY_POD_NAME" = "pxc-backup-mongodb-0" ]; then
                    # Primary pod is ready if MongoDB is responding (even before replica set init)
                    exit 0
                  else
                    # Secondary pods need to be part of replica set
                    mongosh --quiet --eval 'db.hello().isWritablePrimary || db.hello().secondary' | grep -q 'true'
                  fi
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          # Startup probe
          startupProbe:
            exec:
              command:
                - bash
                - -c
                - |
                  mongosh --quiet --eval 'db.adminCommand("ping")' > /dev/null 2>&1
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          volumeMounts:
            - mountPath: /data/db
              name: pxc-mongodb-data
            - mountPath: /scripts/setup.sh
              name: scripts
              subPath: setup.sh
          {{- if .Values.proxy.configSecretName }}
            - mountPath: /etc/ssl/certs/proxy-ca.pem
              subPath: proxy-ca.pem
              name: proxy-ca-volume
              readOnly: true
          {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: scripts
          configMap:
            defaultMode: 493
            name: pxc-backup-mongodb-scripts
        {{- if eq $externalPersistentStorageEnabled false }}
        - name: pxc-mongodb-data
          emptyDir: {}
        {{- end }}
      {{- if .Values.proxy.configSecretName }}
        - name: proxy-ca-volume
          secret:
            items:
            - key: CA
              path: proxy-ca.pem
            optional: true
            secretName: {{ .Values.proxy.configSecretName }}
      {{- end }}
  {{- if eq $externalPersistentStorageEnabled true }}
  volumeClaimTemplates:
    - metadata:
        name: pxc-mongodb-data
      spec:
        accessModes:
          - "ReadWriteOnce"
        resources:
          requests:
            storage: {{ .Values.persistentStorage.mongodbVolumeSize }}
        {{- if .Values.persistentStorage.storageClassName }}
        storageClassName: {{ .Values.persistentStorage.storageClassName }}
        {{- end }}
  {{- end }}
{{- end -}}
