{{/* PX-Backup Telemetry Metrics Collector ConfigMaps */}}
{{- $pxBackupEnabled := .Values.pxbackup.enabled | default false }}
{{- $telemetryEnabled := .Values.telemetry.enabled | default false }}
{{- $metricsEnabled := .Values.telemetry.metricsCollector.enabled | default false }}
{{- if and (eq $pxBackupEnabled true) (eq $telemetryEnabled true) (eq $metricsEnabled true) }}
---
# Prometheus Metrics Collector Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: px-backup-telemetry-metrics-collector-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: px-backup-telemetry
    app.kubernetes.io/name: metrics-collector
{{- include "px-central.labels" . | nindent 4 }}
data:
  px-backup.yaml: |
    scrapeConfig:
      # How often to scrape metrics (seconds)
      interval: {{ .Values.telemetry.metricsCollector.scrapeInterval | default 10 }}

      # Static target configuration
      staticConfig:
        targets:
        - name: px-backup
          # Use /telemetry/metrics endpoint which respects runtime pause/resume flag
          url: http://px-backup.{{ .Release.Namespace }}.svc.cluster.local:10001/telemetry/metrics

    # Forward configuration
    forwardConfig:
      # Forward to local edge-envoy sidecar which handles mTLS to Pure1.
      # NOTE: 12002 is coupled to edge-envoy:2.0.109's internal listener layout — review
      # this port when bumping the edge-envoy image tag (.Values.images.telemetryEnvoyImage.tag).
      url: http://localhost:12002/metrics/1.0/pure1-metrics-pb
{{- end }}
