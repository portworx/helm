{{/* PX-Backup Telemetry Registration Deployment */}}
{{- $pxBackupEnabled := .Values.pxbackup.enabled | default false }}
{{- $telemetryEnabled := .Values.telemetry.enabled | default false }}
{{- $isOpenshiftCluster := or .Values.isOpenshift (.Capabilities.APIVersions.Has "apps.openshift.io/v1") -}}
{{- /* map telemetry.environment (staging|production) to edge-envoy's EE_ENV vocabulary (stg|prd) */ -}}
{{- $eeEnv := "stg" }}
{{- if eq (.Values.telemetry.environment | default "production" | lower | trim) "production" }}
{{- $eeEnv = "prd" }}
{{- end }}
{{- if and (eq $pxBackupEnabled true) (eq $telemetryEnabled true) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: px-backup-telemetry-registration
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: px-backup-telemetry
    app.kubernetes.io/component: registration
{{- include "px-central.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: px-backup-telemetry
      app.kubernetes.io/component: registration
  template:
    metadata:
      labels:
{{- include "px-central.labels" . | nindent 8 }}
        app.kubernetes.io/name: px-backup-telemetry
        app.kubernetes.io/component: registration
    spec:
      serviceAccountName: px-backup-telemetry
      {{- if not $isOpenshiftCluster }}
      securityContext:
{{ toYaml .Values.securityContext | indent 8 }}
      {{- end }}
      {{- if .Values.images.pullSecrets }}
      imagePullSecrets:
        {{- range $sec := .Values.images.pullSecrets }}
        - name: {{ $sec | quote }}
        {{- end }}
      {{- end }}
      containers:
      # CCM-Go - Registration service
      - name: registration
        image: {{ printf "%s/%s/%s:%s" (default .Values.images.telemetryRegistrationImage.registry .Values.images.registry) (default .Values.images.telemetryRegistrationImage.repo .Values.images.repo) .Values.images.telemetryRegistrationImage.imageName .Values.images.telemetryRegistrationImage.tag }}
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        env:
        # CONFIG path and mount path aligned with PX-E convention (relative to workdir, /config mount).
        - name: CONFIG
          value: "config/config_properties_px.yaml"
        - name: APPLIANCE_ID
          valueFrom:
            configMapKeyRef:
              name: px-backup-telemetry-config
              key: appliance-id
              optional: false  # Pod won't start until ConfigMap key exists
        - name: APPLIANCE_NAME
          value: "px-backup-{{ .Release.Namespace }}"
        - name: REFRESH_TOKEN
          value: ""
        {{- if not $isOpenshiftCluster }}
        securityContext:
          runAsUser: 1000
        {{- end }}
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        # Health probes - same as px-e telemetry registration
        livenessProbe:
          httpGet:
            path: /status/environment
            port: 12011
          periodSeconds: 150
          failureThreshold: 3
          timeoutSeconds: 1
        readinessProbe:
          httpGet:
            path: /status/environment
            port: 12011
          periodSeconds: 150
          failureThreshold: 3
          timeoutSeconds: 1
        volumeMounts:
        - name: registration-config
          mountPath: /config
      # Edge-envoy - mTLS proxy.
      # Config + certs are fetched from the px-backup CO-Server (CO_ADDR) at runtime.
      - name: envoy
        image: {{ printf "%s/%s/%s:%s" (default .Values.images.telemetryEnvoyImage.registry .Values.images.registry) (default .Values.images.telemetryEnvoyImage.repo .Values.images.repo) .Values.images.telemetryEnvoyImage.imageName .Values.images.telemetryEnvoyImage.tag }}
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        args:
        - --base-id
        - "5"
        ports:
        - name: ee-http
          containerPort: 12008
          protocol: TCP
        env:
        - name: EE_DEVICETYPE
          value: "PORTWORX"
        - name: EE_DEVICEID
          valueFrom:
            configMapKeyRef:
              name: px-backup-telemetry-config
              key: appliance-id
              optional: false
        - name: EE_SUBDEVICEID
          value: "px-backup-{{ .Release.Namespace }}"
        - name: EE_PRODUCTVERSION
          value: {{ .Values.pxbackup.version | quote }}
        - name: EE_DNS_LOOKUP_FAMILY
          value: "V4_PREFERRED"
        - name: REFRESH_TOKEN
          value: "300"
        - name: EE_ENV
          value: {{ $eeEnv | quote }}
        - name: CO_ADDR
          value: "px-backup.{{ .Release.Namespace }}.svc.cluster.local:10002"
        - name: PIP_ADDR
          value: "px-backup.{{ .Release.Namespace }}.svc.cluster.local:10002"
        - name: POLL_DELAY
          value: "600"
        - name: RETRY_DELAY
          value: "30"
        - name: EE_HTTP_SERVER_ENABLED
          value: "1"
        - name: EE_HTTP_PORT
          value: "12008"
        - name: LOG_LEVEL
          value: "INFO"
        # edge-envoy is Go-based and honors standard
        # HTTP_PROXY/HTTPS_PROXY/NO_PROXY env vars via Go's
        # http.ProxyFromEnvironment. The proxy.proxyEnv helper emits
        # HTTP{S,}_PROXY from .Values.proxy.{http,https,configSecretName}.
        # We additionally force NO_PROXY (cluster-internal services) whenever
        # any proxy is set so the CO-Server gRPC call
        # px-backup.<ns>.svc.cluster.local:10002 does NOT go through the proxy.
        {{- include "proxy.proxyEnv" . | nindent 8 }}
        {{- /* $proxyOn intentionally includes configSecretName even though
               proxy.proxyEnv ALSO emits a NO_PROXY env var from the Secret when
               configSecretName is set. The resulting duplicate NO_PROXY is K8s-safe:
               kubelet accepts duplicates with a warning and applies last-wins.
               Our second emission (the cluster-internal noProxyList) wins, which is
               required so the CO-Server gRPC call bypasses the proxy. Verified on
               K8s 1.32. Do NOT drop configSecretName from this predicate — it would
               silently break the configSecret-only path because the customer's Secret
               typically lacks a NO_PROXY key, leaving the CO-Server endpoint routed
               through the customer proxy. */ -}}
        {{- $proxyOn := or .Values.proxy.configSecretName .Values.proxy.http .Values.proxy.https }}
        {{- if and $proxyOn (not .Values.proxy.httpProxy.noProxy) }}
        - name: NO_PROXY
          value: {{ include "px-central.noProxyList" . | quote }}
        - name: no_proxy
          value: {{ include "px-central.noProxyList" . | quote }}
        {{- end }}
        {{- if not $isOpenshiftCluster }}
        securityContext:
          runAsUser: 10001
        {{- end }}
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        {{- if and (not .Values.istio.enabled) (not .Values.linkerd.enabled) }}
        readinessProbe:
          httpGet:
            path: /status/cert-info
            port: 12008
          periodSeconds: 150
          failureThreshold: 3
          timeoutSeconds: 2
        {{- end }}
      volumes:
      # The appliance-id is consumed via the EE_DEVICEID /
      # APPLIANCE_ID configMapKeyRef (optional:false) env vars above, NOT via a
      # mounted volume.
      - name: registration-config
        configMap:
          name: px-backup-telemetry-registration-config
{{- end }}
