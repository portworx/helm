{{/* PX-Backup Telemetry Registration ConfigMaps */}}
{{- $pxBackupEnabled := .Values.pxbackup.enabled | default false }}
{{- $telemetryEnabled := .Values.telemetry.enabled | default false }}
{{- if and (eq $pxBackupEnabled true) (eq $telemetryEnabled true) }}
{{- /* Lookup existing values to preserve during upgrades */ -}}
{{- $applianceID := include "telemetry.lookupApplianceID" (dict
    "configMapName" "px-backup-telemetry-registration-envoy-config"
    "configKey" "envoy-config-register.yaml"
    "namespace" .Release.Namespace) | trim }}
{{- $registerEndpoint := include "telemetry.lookupEndpoint" (dict
    "configMapName" "px-backup-telemetry-registration-envoy-config"
    "configKey" "envoy-config-register.yaml"
    "namespace" .Release.Namespace
    "placeholder" "ENDPOINT_REGISTER_PLACEHOLDER") | trim }}
{{- /* Detect if proxy is configured */ -}}
{{- $proxyEnabled := or .Values.proxy.configSecretName .Values.proxy.http .Values.proxy.https }}
---
# CCM-Go Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: px-backup-telemetry-registration-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: px-backup-telemetry
{{- include "px-central.labels" . | nindent 4 }}
data:
  config_properties_px.yaml: |
    actKeyRequired: false
    cert:
      keySize: 2048
      renewWindowInDays: 30
      registrationEnabled: true
      renewEnabled: true
      keyAlgorithm: "RSA"
      noRelCertEnabled: true
      release:
        staging:
          private: "/opt/ccm/cert/rel_priv_staging.pem"
        production:
          private: "/opt/ccm/cert/rel_priv.pem"
    subscription:
      useApplianceId: true
      accountType: "UNKNOWN"
    standalone:
      # Note: CCM-Go reads appliance-id from APPLIANCE_ID environment variable, not from file
      generateApplianceIdEnabled: false
    envoy:
      protocol: "http"
      registrationHost: "localhost"
      registrationPort: "12001"
      renewalHost: "localhost"
      renewalPort: "12002"
    cloud:
      auth:
        version: "1.0"
    productName: "portworx"
    certStoreType: "kvstore"
    kvStore:
      serverAddress: "px-backup.{{ .Release.Namespace }}.svc.cluster.local:10002"
    httpServer:
      port: "12011"
      enabled: false
    k8s:
      certSecretName: "pure-telemetry-certs"
      certSecretNamespace: {{ .Release.Namespace | quote }}
---
# Envoy Proxy Configuration for Registration
apiVersion: v1
kind: ConfigMap
metadata:
  name: px-backup-telemetry-registration-envoy-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: px-backup-telemetry
{{- include "px-central.labels" . | nindent 4 }}
data:
  envoy-config-register.yaml: |
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901
    static_resources:
      listeners:
      # Main HTTP listener - receives requests from CCM-Go registration service
      - name: listener_register_cloud_support
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 12001
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              access_log:
              - name: envoy.access_loggers.stdout
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
              route_config:
                name: local_route
                virtual_hosts:
                - name: local_service
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    request_headers_to_add:
                    - header:
                        key: "product-name"
                        value: "portworx"
                    - header:
                        key: "appliance-id"
                        value: {{ $applianceID | quote }}
                    - header:
                        key: "component-sn"
                        value: "px-backup-registration"
                    - header:
                        key: "product-version"
                        value: {{ .Values.pxbackup.version | quote }}
                    route:
                      host_rewrite_literal: {{ $registerEndpoint }}
                      cluster: cluster_register_cloud_support
      {{- if $proxyEnabled }}
      # Internal redirect listener for HTTP CONNECT tunneling through customer proxy
      # This listener receives traffic from cluster_register_cloud_support and establishes
      # the HTTP CONNECT tunnel to the customer proxy
      - name: listener_register_customer_proxy_envoy_internal_redirect
        address:
          socket_address:
            protocol: TCP
            address: 127.0.0.1
            port_value: 12005
        filter_chains:
        - filters:
          - name: envoy.filters.network.tcp_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
              stat_prefix: ingress_register_customer_proxy_envoy_internal_redirect
              access_log:
              - name: envoy.access_loggers.stdout
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
              cluster: cluster_customer_proxy
              tunneling_config:
                hostname: {{ $registerEndpoint }}:443
                headers_to_add:
                - header:
                    key: "product-name"
                    value: "portworx"
                - header:
                    key: "appliance-id"
                    value: {{ $applianceID | quote }}
                - header:
                    key: "component-sn"
                    value: "px-backup-registration"
                - header:
                    key: "product-version"
                    value: {{ .Values.pxbackup.version | quote }}
                # Proxy-Authorization header - placeholder replaced by Go code at runtime
                - header:
                    key: "proxy-authorization"
                    value: "PROXY_AUTH_PLACEHOLDER"
      {{- end }}
      clusters:
      - name: cluster_register_cloud_support
        type: STRICT_DNS
        dns_lookup_family: V4_ONLY
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: cluster_register_cloud_support
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    {{- if $proxyEnabled }}
                    # Route to internal redirect listener for HTTP CONNECT tunneling
                    address: 127.0.0.1
                    port_value: 12005
                    {{- else }}
                    # Direct connection to Pure1
                    address: {{ $registerEndpoint }}
                    port_value: 443
                    {{- end }}
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: {{ $registerEndpoint }}
            common_tls_context:
              validation_context:
                trusted_ca:
                  filename: /etc/ssl/certs/ca-certificates.crt
                match_typed_subject_alt_names:
                - san_type: DNS
                  matcher:
                    exact: {{ $registerEndpoint }}
      {{- if $proxyEnabled }}
      # Customer proxy cluster - connects to the actual corporate proxy
      - name: cluster_customer_proxy
        type: STRICT_DNS
        dns_lookup_family: V4_ONLY
        lb_policy: ROUND_ROBIN
        # HTTP/1.1 for HTTP CONNECT tunneling
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config:
              http_protocol_options: {}
        load_assignment:
          cluster_name: cluster_customer_proxy
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    # Proxy address - replaced by Go code at runtime
                    address: PROXY_HOST_PLACEHOLDER
                    port_value: PROXY_PORT_PLACEHOLDER
      {{- end }}
{{- end }}
