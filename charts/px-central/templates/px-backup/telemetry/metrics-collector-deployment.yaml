{{/* PX-Backup Telemetry Metrics Collector Deployment */}}
{{- $pxBackupEnabled := .Values.pxbackup.enabled | default false }}
{{- $telemetryEnabled := .Values.telemetry.enabled | default false }}
{{- $metricsEnabled := .Values.telemetry.metricsCollector.enabled | default false }}
{{- $isOpenshiftCluster := or .Values.isOpenshift (.Capabilities.APIVersions.Has "apps.openshift.io/v1") -}}
{{- /* map telemetry.environment (staging|production) to edge-envoy's EE_ENV vocabulary (stg|prd) */ -}}
{{- $eeEnv := "stg" }}
{{- if eq (.Values.telemetry.environment | default "production" | lower | trim) "production" }}
{{- $eeEnv = "prd" }}
{{- end }}
{{- if and (eq $pxBackupEnabled true) (eq $telemetryEnabled true) (eq $metricsEnabled true) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: px-backup-telemetry-metrics-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: px-backup-telemetry
    app.kubernetes.io/component: metrics-collector
{{- include "px-central.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: px-backup-telemetry
      app.kubernetes.io/component: metrics-collector
  template:
    metadata:
      labels:
{{- include "px-central.labels" . | nindent 8 }}
        app.kubernetes.io/name: px-backup-telemetry
        app.kubernetes.io/component: metrics-collector
    spec:
      serviceAccountName: px-backup-telemetry
      {{- if not $isOpenshiftCluster }}
      securityContext:
{{ toYaml .Values.securityContext | indent 8 }}
      {{- end }}
      {{- if .Values.images.pullSecrets }}
      imagePullSecrets:
        {{- range $sec := .Values.images.pullSecrets }}
        - name: {{ $sec | quote }}
        {{- end }}
      {{- end }}
      containers:
      # Realtime Metrics Collector — forwards to local edge-envoy on :12002.
      - name: collector
        image: {{ printf "%s/%s/%s:%s" (default .Values.images.telemetryMetricsCollectorImage.registry .Values.images.registry) (default .Values.images.telemetryMetricsCollectorImage.repo .Values.images.repo) .Values.images.telemetryMetricsCollectorImage.imageName .Values.images.telemetryMetricsCollectorImage.tag }}
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        env:
        - name: CONFIG
          value: "config/px-backup.yaml"
        {{- if not $isOpenshiftCluster }}
        securityContext:
          runAsUser: 1000
        {{- end }}
        resources:
          requests:
            cpu: 200m
            memory: 64Mi
          limits:
            cpu: 400m
            memory: 128Mi
        volumeMounts:
        - name: collector-config
          mountPath: /config
          readOnly: true
      # Edge-envoy — mTLS proxy.
      - name: envoy
        image: {{ printf "%s/%s/%s:%s" (default .Values.images.telemetryEnvoyImage.registry .Values.images.registry) (default .Values.images.telemetryEnvoyImage.repo .Values.images.repo) .Values.images.telemetryEnvoyImage.imageName .Values.images.telemetryEnvoyImage.tag }}
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        args:
        - --base-id
        - "4"
        ports:
        - name: ee-http
          containerPort: 12009
          protocol: TCP
        - name: metrics-up
          containerPort: 12002
          protocol: TCP
        env:
        - name: EE_DEVICETYPE
          value: "PORTWORX"
        - name: EE_DEVICEID
          valueFrom:
            configMapKeyRef:
              name: px-backup-telemetry-config
              key: appliance-id
              optional: false
        - name: EE_SUBDEVICEID
          value: "px-backup-{{ .Release.Namespace }}"
        - name: EE_PRODUCTVERSION
          value: {{ .Values.pxbackup.version | quote }}
        - name: EE_DNS_LOOKUP_FAMILY
          value: "V4_PREFERRED"
        - name: REFRESH_TOKEN
          value: "300"
        - name: EE_ENV
          value: {{ $eeEnv | quote }}
        - name: CO_ADDR
          value: "px-backup.{{ .Release.Namespace }}.svc.cluster.local:10002"
        - name: PIP_ADDR
          value: "px-backup.{{ .Release.Namespace }}.svc.cluster.local:10002"
        - name: POLL_DELAY
          value: "600"
        - name: RETRY_DELAY
          value: "30"
        - name: EE_HTTP_SERVER_ENABLED
          value: "1"
        - name: EE_HTTP_PORT
          value: "12009"
        - name: LOG_LEVEL
          value: "INFO"
        # edge-envoy honors standard HTTP_PROXY/HTTPS_PROXY/NO_PROXY
        # via Go's http.ProxyFromEnvironment. NO_PROXY is forced whenever any proxy
        # is set so the CO-Server gRPC call bypasses the proxy.
        {{- include "proxy.proxyEnv" . | nindent 8 }}
        {{- /* See registration-deployment.yaml for the rationale on
               keeping configSecretName in $proxyOn. K8s last-wins duplicate-env
               semantics is what makes the cluster-internal NO_PROXY override the
               Secret's NO_PROXY. Do NOT remove configSecretName here. */ -}}
        {{- $proxyOn := or .Values.proxy.configSecretName .Values.proxy.http .Values.proxy.https }}
        {{- if and $proxyOn (not .Values.proxy.httpProxy.noProxy) }}
        - name: NO_PROXY
          value: {{ include "px-central.noProxyList" . | quote }}
        - name: no_proxy
          value: {{ include "px-central.noProxyList" . | quote }}
        {{- end }}
        {{- if not $isOpenshiftCluster }}
        securityContext:
          runAsUser: 10001
        {{- end }}
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        {{- if and (not .Values.istio.enabled) (not .Values.linkerd.enabled) }}
        readinessProbe:
          httpGet:
            path: /status/cert-info
            port: 12009
          periodSeconds: 150
          failureThreshold: 3
          timeoutSeconds: 2
        {{- end }}
      volumes:
      # The appliance-id is consumed via the EE_DEVICEID
      # configMapKeyRef (optional:false) env var above, NOT via a mounted volume.
      - name: collector-config
        configMap:
          name: px-backup-telemetry-metrics-collector-config
{{- end }}
