{{/* PX-Backup Telemetry Logs Collector ConfigMaps */}}
{{- $pxBackupEnabled := .Values.pxbackup.enabled | default false }}
{{- $telemetryEnabled := .Values.telemetry.enabled | default false }}
{{- $logsEnabled := .Values.telemetry.logsCollector.enabled | default false }}
{{- if and (eq $pxBackupEnabled true) (eq $telemetryEnabled true) (eq $logsEnabled true) }}
{{- /* Lookup existing values to preserve during upgrades */ -}}
{{- $applianceID := include "telemetry.lookupApplianceID" (dict
    "configMapName" "px-backup-telemetry-logs-envoy-config"
    "configKey" "envoy-config.yaml"
    "namespace" .Release.Namespace) | trim }}
{{- $restEndpoint := include "telemetry.lookupEndpoint" (dict
    "configMapName" "px-backup-telemetry-logs-envoy-config"
    "configKey" "envoy-config.yaml"
    "namespace" .Release.Namespace
    "placeholder" "ENDPOINT_REST_PLACEHOLDER") | trim }}
{{- /* Detect if proxy is configured */ -}}
{{- $proxyEnabled := or .Values.proxy.configSecretName .Values.proxy.http .Values.proxy.https }}
---
# Envoy Proxy Configuration for Logs Upload
apiVersion: v1
kind: ConfigMap
metadata:
  name: px-backup-telemetry-logs-envoy-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: px-backup-telemetry
    app.kubernetes.io/name: logs-collector
{{- include "px-central.labels" . | nindent 4 }}
data:
  envoy-config.yaml: |
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901
    # Node identification (required for SDS)
    node:
      id: "id_logs"
      cluster: "cluster_logs"
    static_resources:
      listeners:
      # Main HTTP listener - receives requests from log-upload-service
      - name: listener_logs
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 12002
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              codec_type: AUTO
              route_config:
                name: local_route
                virtual_hosts:
                - name: local_service
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    request_headers_to_add:
                    - header:
                        key: "product-name"
                        value: "portworx"
                    - header:
                        key: "appliance-id"
                        value: {{ $applianceID | quote }}
                    - header:
                        key: "component-sn"
                        value: "px-backup-logs-collector"
                    - header:
                        key: "product-version"
                        value: {{ .Values.pxbackup.version | quote }}
                    route:
                      host_rewrite_literal: {{ $restEndpoint }}
                      cluster: service_logs
                      timeout: 60s
                      # Retry policy for resilience during cert loading race condition
                      retry_policy:
                        retry_on: "5xx,reset,connect-failure,refused-stream"
                        num_retries: 3
                        per_try_timeout: 30s
                        retry_back_off:
                          base_interval: 1s
                          max_interval: 10s
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      {{- if $proxyEnabled }}
      # Internal redirect listener for HTTP CONNECT tunneling through customer proxy
      - name: listener_logs_customer_proxy_envoy_internal_redirect
        address:
          socket_address:
            protocol: TCP
            address: 127.0.0.1
            port_value: 12006
        filter_chains:
        - filters:
          - name: envoy.filters.network.tcp_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
              stat_prefix: ingress_logs_customer_proxy_envoy_internal_redirect
              access_log:
              - name: envoy.access_loggers.stdout
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
              cluster: cluster_customer_proxy
              tunneling_config:
                hostname: {{ $restEndpoint }}:443
                headers_to_add:
                - header:
                    key: "product-name"
                    value: "portworx"
                - header:
                    key: "appliance-id"
                    value: {{ $applianceID | quote }}
                - header:
                    key: "component-sn"
                    value: "px-backup-logs-collector"
                - header:
                    key: "product-version"
                    value: {{ .Values.pxbackup.version | quote }}
                # Proxy-Authorization header - placeholder replaced by Go code at runtime
                # This block is removed by Go code if no authentication is required
                - header:
                    key: "proxy-authorization"
                    value: "PROXY_AUTH_PLACEHOLDER"
      {{- end }}
      clusters:
      - name: service_logs
        connect_timeout: 30s
        type: STRICT_DNS
        dns_lookup_family: V4_ONLY
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: service_logs
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    {{- if $proxyEnabled }}
                    # Route to internal redirect listener for HTTP CONNECT tunneling
                    address: 127.0.0.1
                    port_value: 12006
                    {{- else }}
                    # Direct connection to Pure1
                    address: {{ $restEndpoint }}
                    port_value: 443
                    {{- end }}
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: {{ $restEndpoint }}
            common_tls_context:
              # Client certificate configuration using SDS
              tls_certificate_sds_secret_configs:
              - name: tls_sds
                sds_config:
                  path: /etc/envoy/sds/tls_certificate_sds_secret.yaml
              validation_context:
                trusted_ca:
                  filename: /etc/ssl/certs/ca-certificates.crt
                match_typed_subject_alt_names:
                - san_type: DNS
                  matcher:
                    exact: {{ $restEndpoint }}
      {{- if $proxyEnabled }}
      # Customer proxy cluster - connects to the actual corporate proxy
      - name: cluster_customer_proxy
        type: STRICT_DNS
        dns_lookup_family: V4_ONLY
        lb_policy: ROUND_ROBIN
        # HTTP/1.1 for HTTP CONNECT tunneling
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config:
              http_protocol_options: {}
        load_assignment:
          cluster_name: cluster_customer_proxy
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    # Proxy address - replaced by Go code at runtime
                    address: PROXY_HOST_PLACEHOLDER
                    port_value: PROXY_PORT_PLACEHOLDER
      {{- end }}
---
# Envoy SDS (Secret Discovery Service) Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: px-backup-telemetry-logs-envoy-sds-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: px-backup-telemetry
    app.kubernetes.io/name: logs-collector
{{- include "px-central.labels" . | nindent 4 }}
data:
  tls_certificate_sds_secret.yaml: |
    resources:
    - "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret
      name: tls_sds
      tls_certificate:
        certificate_chain:
          filename: /appliance-cert/cert
        private_key:
          filename: /appliance-cert/private_key
        # Watch directory for certificate changes
        watched_directory:
          path: /appliance-cert
---
# Log Upload Service Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: px-backup-telemetry-logs-upload-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: px-backup-telemetry
    app.kubernetes.io/name: logs-collector
{{- include "px-central.labels" . | nindent 4 }}
data:
  ccm.properties: |
    {
      "product_name": "portworx",
      "port": "9090",
      "envoy_port": "12002",
      "logupload": {
        "logfile_patterns": [
          "/var/cores/px-backup-logs-*.log.gz",
          "/var/cores/px-backup-reporting-*.log.gz",
          "/var/cores/px-backup-metrics-*.log.gz",
          "/var/cores/px-backup-db-*.tar.gz"
        ],
        "logfile_retention_count": 5,
        "phonehome_hour_range": 744,
        "always_scan_range_days": 7,
        "max_retry_per_hour": 5
      }
    }
{{- end }}

