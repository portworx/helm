{{/* PX-Backup Telemetry Logs Collector Deployment */}}
{{- $pxBackupEnabled := .Values.pxbackup.enabled | default false }}
{{- $telemetryEnabled := .Values.telemetry.enabled | default false }}
{{- $logsEnabled := .Values.telemetry.logsCollector.enabled | default false }}
{{- $isOpenshiftCluster := or .Values.isOpenshift (.Capabilities.APIVersions.Has "apps.openshift.io/v1") -}}
{{- if and (eq $pxBackupEnabled true) (eq $telemetryEnabled true) (eq $logsEnabled true) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: px-backup-telemetry-logs-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: px-backup-telemetry
    app.kubernetes.io/component: logs-collector
{{- include "px-central.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: px-backup-telemetry-logs-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: px-backup-telemetry
    app.kubernetes.io/component: logs-collector
{{- include "px-central.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["pure-telemetry-certs", "baas-secret", "pxc-backup-mongodb"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: px-backup-telemetry-logs-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: px-backup-telemetry
    app.kubernetes.io/component: logs-collector
{{- include "px-central.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: px-backup-telemetry-logs-collector
subjects:
- kind: ServiceAccount
  name: px-backup-telemetry-logs-collector
  namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: px-backup-telemetry-logs-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: px-backup-telemetry
    app.kubernetes.io/component: logs-collector
{{- include "px-central.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: px-backup-telemetry
      app.kubernetes.io/component: logs-collector
  template:
    metadata:
      labels:
{{- include "px-central.labels" . | nindent 8 }}
        app.kubernetes.io/name: px-backup-telemetry
        app.kubernetes.io/component: logs-collector
    spec:
      serviceAccountName: px-backup-telemetry-logs-collector
      {{- if not $isOpenshiftCluster }}
      securityContext:
{{ toYaml .Values.securityContext | indent 8 }}
      {{- end }}
      {{- if .Values.images.pullSecrets }}
      imagePullSecrets:
        {{- range $sec := .Values.images.pullSecrets }}
        - name: {{ $sec | quote }}
        {{- end }}
      {{- end }}
      initContainers:
      {{- include "px-central.envoyConfigWaitInit" (dict "root" $ "mountPath" "/etc/envoy/config" "configFile" "envoy-config.yaml") | nindent 6 }}
      containers:
      # Container 1: Telemetry Data Collector (Go binary)
      - name: log-collector
        image: {{ printf "%s/%s/%s:%s" (default .Values.images.telemetryDataCollectorImage.registry .Values.images.registry) (default .Values.images.telemetryDataCollectorImage.repo .Values.images.repo) .Values.images.telemetryDataCollectorImage.imageName .Values.images.telemetryDataCollectorImage.tag }}
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        env:
        # Kubernetes configuration (using standard px-backup pattern)
        - name: PX_BACKUP_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        # Collection configuration
        - name: COLLECTION_INTERVAL
          value: {{ .Values.telemetry.logsCollector.collectionInterval | default 3600 }}s

        # Reporting API configuration (gRPC)
        - name: REPORTING_API_ADDR
          value: "px-backup.{{ .Release.Namespace }}.svc.cluster.local:10002"

        # Upload service configuration (REST API to log-upload-service sidecar)
        - name: UPLOAD_SERVICE_URL
          value: "http://localhost:8080"

        # Log storage configuration
        - name: CLEANUP_AGE
          value: "4h"

        # Pod exclusion patterns (for excluding entire pods from collection)
        - name: EXCLUDE_POD_PATTERNS
          value: {{ .Values.telemetry.logsCollector.excludePodPatterns | default "alertmanager,prometheus,telemetry" | quote }}

        - name: MONGODB_USERNAME
          valueFrom:
            secretKeyRef:
              name: pxc-backup-mongodb
              key: mongodb-username
        - name: MONGODB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pxc-backup-mongodb
              key: mongodb-password
        - name: ENCRYPT_MONGODB
          value: {{ .Values.pxbackup.encryptMongoDB | default false | quote }}

        # MongoDB exporter bytes-bounded batching.
        # Performance internals — tuned against the log-collector memory limit
        - name: DB_EXPORT_FLUSH_BYTES
          value: "100663296"        # 96 MB
        - name: DB_EXPORT_MAX_FLUSH_DOCS
          value: "10000"
        - name: DB_EXPORT_CURSOR_BATCH
          value: "1000"

        {{- if not $isOpenshiftCluster }}
        securityContext:
          runAsUser: 1000
        {{- end }}
        volumeMounts:
        - name: telemetry-storage
          mountPath: /var/cores
          subPath: cores
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      
      # Container 2: Log Upload Service
      - name: log-upload-service
        image: {{ printf "%s/%s/%s:%s" (default .Values.images.telemetryLogUploadImage.registry .Values.images.registry) (default .Values.images.telemetryLogUploadImage.repo .Values.images.repo) .Values.images.telemetryLogUploadImage.imageName .Values.images.telemetryLogUploadImage.tag }}
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        ports:
        - name: grpc
          containerPort: 9090
          protocol: TCP
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: CONFIG_FILE
          value: "/config/ccm.properties"
        - name: APPLIANCE_ID
          valueFrom:
            configMapKeyRef:
              name: px-backup-telemetry-config
              key: appliance-id
        - name: APPLIANCE_NAME
          value: "px-backup-{{ .Release.Namespace }}"
        - name: LOG_UPLOAD_REST_PORT
          value: "8080"
        {{- if not $isOpenshiftCluster }}
        securityContext:
          runAsUser: 1000
        {{- end }}
        volumeMounts:
        - name: telemetry-storage
          mountPath: /var/cores
          subPath: cores
        - name: log-upload-config
          mountPath: /config
          readOnly: true
        - name: telemetry-storage
          mountPath: /var/cache
          subPath: cache
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        # Health probe - verifies log-upload-service is ready (same as px-e)
        readinessProbe:
          grpc:
            port: 9090
          periodSeconds: 150
          failureThreshold: 3
          timeoutSeconds: 2

      # Container 3: Envoy Proxy
      - name: envoy
        image: {{ printf "%s/%s/%s:%s" (default .Values.images.telemetryEnvoyImage.registry .Values.images.registry) (default .Values.images.telemetryEnvoyImage.repo .Values.images.repo) .Values.images.telemetryEnvoyImage.imageName .Values.images.telemetryEnvoyImage.tag }}
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        env:
        {{- /* Proxy environment variables for telemetry */ -}}
        {{- if .Values.proxy.configSecretName }}
        # Proxy with auth/CA from secret
        - name: PX_HTTP_PROXY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.proxy.configSecretName }}
              key: HTTP_PROXY
              optional: true
        - name: PX_HTTPS_PROXY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.proxy.configSecretName }}
              key: HTTPS_PROXY
              optional: true
        {{- else if or .Values.proxy.http .Values.proxy.https }}
        # Direct proxy values
        {{- if .Values.proxy.http }}
        - name: PX_HTTP_PROXY
          value: {{ .Values.proxy.http | quote }}
        {{- end }}
        {{- if .Values.proxy.https }}
        - name: PX_HTTPS_PROXY
          value: {{ .Values.proxy.https | quote }}
        {{- end }}
        {{- end }}
        args:
        - envoy
        - --base-id
        - "3"
        - --config-path
        - /etc/envoy/config/envoy-config.yaml
        ports:
        - name: logs-proxy
          containerPort: 12002
          protocol: TCP
        - name: admin
          containerPort: 9901
          protocol: TCP
        {{- if not $isOpenshiftCluster }}
        securityContext:
          runAsUser: 1000
        {{- end }}
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy/config
          readOnly: true
        - name: envoy-sds-config
          mountPath: /etc/envoy/sds
          readOnly: true
        - name: telemetry-certs
          mountPath: /appliance-cert
          readOnly: true
        {{- if .Values.proxy.configSecretName }}
        # Proxy CA certificate mount
        - name: proxy-ca-cert
          mountPath: /etc/envoy/proxy-certs
          readOnly: true
        {{- end }}
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "400m"
        {{- if and (not .Values.istio.enabled) (not .Values.linkerd.enabled) }}
        # Health probe - verifies envoy can reach upstream (Pure1)
        # Envoy listens on 0.0.0.0 (matching px-e pattern) so probe works on both K8s and OpenShift
        # Disabled when Istio/Linkerd is enabled because service mesh sidecar injectors
        readinessProbe:
          httpGet:
            path: /ping-trusted
            port: 12002
          periodSeconds: 150
          failureThreshold: 3
          timeoutSeconds: 15
        {{- end }}

      volumes:
      # Telemetry storage volume - single PVC with subPath for logs and cache
      - name: telemetry-storage
        persistentVolumeClaim:
          claimName: px-backup-telemetry-storage
      - name: log-upload-config
        configMap:
          name: px-backup-telemetry-logs-upload-config
      - name: envoy-config
        configMap:
          name: px-backup-telemetry-logs-envoy-config
          optional: false  # Pod won't start until Envoy ConfigMap exists
      - name: envoy-sds-config
        configMap:
          name: px-backup-telemetry-logs-envoy-sds-config
      - name: telemetry-certs
        secret:
          secretName: pure-telemetry-certs
          optional: false  # Pod won't start until certificate exists
      {{- if .Values.proxy.configSecretName }}
      # Proxy CA certificate volume
      - name: proxy-ca-cert
        secret:
          secretName: {{ .Values.proxy.configSecretName }}
          items:
          - key: CA
            path: proxy-ca.crt
          optional: true  # CA is optional even when secret exists
      {{- end }}
---
{{/* Single PVC for telemetry storage (logs in /cores, cache in /cache via subPath) */}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: px-backup-telemetry-storage
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: px-backup-telemetry
    app.kubernetes.io/component: logs-collector
{{- include "px-central.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.persistentStorage.storageClassName }}
  storageClassName: {{ .Values.persistentStorage.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistentStorage.telemetryVolumeSize }}
{{- end }}

