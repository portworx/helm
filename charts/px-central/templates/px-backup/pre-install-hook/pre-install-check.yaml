{{- $pxBackupEnabled := .Values.pxbackup.enabled | default false }}
{{- $pxMonitorEnabled := .Values.pxmonitor.enabled | default false }}
{{- $minimumKubernetesVersion := "1.30.0"}}
{{- $deployDedicatedMonitoringSystem := .Values.pxbackup.deployDedicatedMonitoringSystem }}
{{- $isOpenshiftCluster := or .Values.isOpenshift (.Capabilities.APIVersions.Has "apps.openshift.io/v1") -}}
{{- $azureProxyEnabled := .Values.proxy.azureProxyEnabled | default false }}

{{- if not .Values.isUpgrade }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: px-backup-pre-install-account
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    name: pxcentral-pre-install-hook
    app.kubernetes.io/component: pxcentral-pre-install-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: px-backup-pre-install-role
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    name: pxcentral-pre-install-hook
    app.kubernetes.io/component: pxcentral-pre-install-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list","update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["delete","get", "list", "watch","create","update"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["delete","get", "list", "watch","update","create"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "create", "delete", "update", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "jobs/status"]
    verbs: ["get", "create", "delete", "update",  "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "create", "delete", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["create", "update", "get", "patch", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["create", "update", "get", "patch", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["get", "list", "watch"]
---
# Pre-install ClusterRole (cluster-scoped resources)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-px-backup-pre-install-clusterrole
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    name: pxcentral-pre-install-hook
    app.kubernetes.io/component: pxcentral-pre-install-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
rules:
  # For ValidateNamespace
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # For ValidateStorageClass / Storage provisioner validation
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: px-backup-pre-install-rolebinding
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    name: pxcentral-pre-install-hook
    app.kubernetes.io/component: pxcentral-pre-install-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: px-backup-pre-install-account
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: px-backup-pre-install-role
  apiGroup: rbac.authorization.k8s.io
---
# Pre-install ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-px-backup-pre-install-clusterrolebinding
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    name: pxcentral-pre-install-hook
    app.kubernetes.io/component: pxcentral-pre-install-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: px-backup-pre-install-account
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Namespace }}-px-backup-pre-install-clusterrole
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pre-install-data-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    name: pxcentral-pre-install-hook
    app.kubernetes.io/component: pxcentral-pre-install-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    {{- if .Values.isArgoCD }}
    "helm.sh/hook-weight": "6"
    {{- else }}
    "helm.sh/hook-weight": "5"
    {{- end }}
    "helm.sh/resource-policy": keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistentStorage.preInstallHookVolumeSize }}
  {{- if .Values.persistentStorage.storageClassName }}
  storageClassName: {{ .Values.persistentStorage.storageClassName }}
  {{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: pre-install-check
  namespace: {{ .Release.Namespace }}
  labels:
    name: pxcentral-pre-install-hook
    app.kubernetes.io/component: pxcentral-pre-install-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "6"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-completed
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  template:
    {{- if and (eq $azureProxyEnabled true) (not (has "pre-install-check" .Values.proxy.excludeAzureProxyList)) }}
    metadata:
      annotations:
        kubernetes.azure.com/no-http-proxy-vars: "true"
    {{- end }}
    spec:
      serviceAccountName: px-backup-pre-install-account
      {{- if $isOpenshiftCluster}}
      {{- else }}
      securityContext:
{{ toYaml .Values.securityContext | indent 8 }}
      {{- end }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
              {{- if .Values.nodeAffinityLabel }}
                  - key: {{ .Values.nodeAffinityLabel }}
                    operator: Exists
              {{- else }}
                  - key: pxbackup/enabled
                    operator: NotIn
                    values:
                      - "false"
              {{- end }}
      containers:
        - name: pxbackup-pre-install-check
          image: {{ printf "%s/%s/%s:%s" (default .Values.images.preSetupHookImage.registry .Values.images.registry) (default .Values.images.preSetupHookImage.repo .Values.images.repo) .Values.images.preSetupHookImage.imageName .Values.images.preSetupHookImage.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["/pxcentral-hook/bin/pxcentral-hook"]
          args: ["--hook=pre-install"]
          env:
            - name: NAMESPACE
              value: {{ .Release.Namespace }}
            - name: DEFAULT_USER_NAME
              value: {{ .Values.oidc.centralOIDC.defaultUsername | quote }}
            - name: STORAGE_CLASS
              value: {{ .Values.persistentStorage.storageClassName }}
            - name: PX_BACKUP_ENABLED
              value: {{ .Values.pxbackup.enabled | default false | quote }}
            - name: PX_MONITOR_ENABLED
              value: {{ .Values.pxmonitor.enabled | default false | quote }}
            - name: PX_LICENSE_SERVER_ENABLED
              value: {{ .Values.pxlicenseserver.enabled | default false | quote }}
            - name: PROXY_CONFIG_SECRET_NAME
              value: {{ .Values.proxy.configSecretName | default "" | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.oidc.centralOIDC.keyCloakBackendUserName | quote }}
        {{- if eq $deployDedicatedMonitoringSystem true }}
            - name: DEDICATED_PROMETHEUS
              value: "true"
        {{- else }}
            - name: DEDICATED_PROMETHEUS
              value: "false"
            - name: PROMETHEUS_ENDPOINT
              value: {{ .Values.pxbackup.prometheusEndpoint | default "" | quote }}
            - name: ALERTMANAGER_ENDPOINT
              value: {{ .Values.pxbackup.alertmanagerEndpoint | default "" | quote }}
        {{- end }}
          {{- include "serviceMesh.env" . | nindent 12 }}
            - name: MINIMUM_KUBERNETES_VERSION
              value: "{{ $minimumKubernetesVersion }}"
            - name: JOB_TIMEOUT_SECONDS
              value: "600"
            - name: TARGET_PXBACKUP_VERSION
              value: "{{ .Values.pxbackup.version }}"
            - name: SKIP_VALIDATIONS
              value: {{ .Values.pxbackup.skipValidations | default false | quote }}
            - name: ENCRYPT_MONGODB
              value: {{ .Values.pxbackup.encryptMongoDB | default false | quote }}
            {{- if or (empty .Values.proxy.includeNoProxyList) (has "pre-install-check" .Values.proxy.includeNoProxyList) }}
            {{- include "proxy.proxyEnv" . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data-volume
              mountPath: /mnt/data
          {{- if .Values.proxy.configSecretName }}
            - mountPath: /etc/ssl/certs/proxy-ca.pem
              subPath: proxy-ca.pem
              name: proxy-ca-volume
              readOnly: true
          {{- end }}
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: pre-install-data-pvc
      {{- if .Values.proxy.configSecretName }}
        - name: proxy-ca-volume
          secret:
            items:
            - key: CA
              path: proxy-ca.pem
            optional: true
            secretName: {{ .Values.proxy.configSecretName }}
      {{- end }}
      {{- if .Values.images.pullSecrets }}
      imagePullSecrets:
        {{- range $sec := .Values.images.pullSecrets }}
        - name: {{ $sec | quote }}
        {{- end }}
      {{- end }}
      restartPolicy: Never
      {{- with .Values.tolerations }}
      tolerations:
      {{- toYaml . | nindent 8 }}
      {{- end }}
  backoffLimit: 0
{{- end }}
---
{{- if eq $pxBackupEnabled true }}
# Preflight ServiceAccount - runs on both pre-install and pre-upgrade
apiVersion: v1
kind: ServiceAccount
metadata:
  name: px-backup-preflight-account
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    name: pxcentral-preflight-check-hook
    app.kubernetes.io/component: pxcentral-preflight-check-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
---
# Preflight Role (namespace-scoped resources)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: px-backup-preflight-role
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    name: pxcentral-preflight-check-hook
    app.kubernetes.io/component: pxcentral-preflight-check-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
rules:
  # For in-cluster keychain / image pull secrets
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # For saving preflight results
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  # For job cleanup and log collection
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "delete"]
---
# Preflight ClusterRole (cluster-scoped resources like StorageClasses)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-px-backup-preflight-clusterrole
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    name: pxcentral-preflight-check-hook
    app.kubernetes.io/component: pxcentral-preflight-check-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
rules:
  # For ValidateStorageClass
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  # For ValidateNamespace
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
# Preflight RoleBinding (namespace-scoped)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: px-backup-preflight-rolebinding
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    name: pxcentral-preflight-check-hook
    app.kubernetes.io/component: pxcentral-preflight-check-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: px-backup-preflight-account
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: px-backup-preflight-role
  apiGroup: rbac.authorization.k8s.io
---
# Preflight ClusterRoleBinding (for cluster-scoped resources)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-px-backup-preflight-clusterrolebinding
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    name: pxcentral-preflight-check-hook
    app.kubernetes.io/component: pxcentral-preflight-check-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: px-backup-preflight-account
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Namespace }}-px-backup-preflight-clusterrole
  apiGroup: rbac.authorization.k8s.io
---
# Pre Flight check job
apiVersion: batch/v1
kind: Job
metadata:
  name: preflight-check
  namespace: {{ .Release.Namespace }}
  labels:
    name: pxcentral-preflight-check-hook
    app.kubernetes.io/component: pxcentral-preflight-check-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "4"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-completed
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  template:
    {{- if and (eq $azureProxyEnabled true) (not (has "preflight-check" .Values.proxy.excludeAzureProxyList)) }}
    metadata:
      annotations:
        kubernetes.azure.com/no-http-proxy-vars: "true"
    {{- end }}
    spec:
      serviceAccountName: px-backup-preflight-account
      {{- if $isOpenshiftCluster}}
      {{- else }}
      securityContext:
{{ toYaml .Values.securityContext | indent 8 }}
      {{- end }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
              {{- if .Values.nodeAffinityLabel }}
                  - key: {{ .Values.nodeAffinityLabel }}
                    operator: Exists
              {{- else }}
                  - key: pxbackup/enabled
                    operator: NotIn
                    values:
                      - "false"
              {{- end }}
      containers:
        - name: pxbackup-pre-flight-checker
          image: {{ printf "%s/%s/%s:%s" (default .Values.images.preSetupHookImage.registry .Values.images.registry) (default .Values.images.preSetupHookImage.repo .Values.images.repo) .Values.images.preSetupHookImage.imageName .Values.images.preSetupHookImage.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: [ "/pxcentral-hook/bin/pxcentral-hook" ]
          args: [ "--hook=preflight-check" ]
          env:
            - name: NAMESPACE
              value: {{ .Release.Namespace }}
            - name: JOB_TIMEOUT_SECONDS
              value: "600"
            {{- if or (empty .Values.proxy.includeNoProxyList) (has "preflight-check" .Values.proxy.includeNoProxyList) }}
            {{- include "proxy.proxyEnv" . | nindent 12 }}
            {{- end }}
            - name: STORAGE_CLASS
              value: {{ .Values.persistentStorage.storageClassName }}
            - name: IMAGES
              {{- with .Values.images }}
              value: |
              {{- toJson . | nindent 16 }}
              {{- end }}
            - name: PX_BACKUP_ENABLED
              value: {{ .Values.pxbackup.enabled | default false | quote }}
            - name: PX_MONITOR_ENABLED
              value: {{ .Values.pxmonitor.enabled | default false | quote }}
            - name: PX_LICENSE_SERVER_ENABLED
              value: {{ .Values.pxlicenseserver.enabled | default false | quote }}
            - name: DOCREGISTRY_SECRET_NAME
              value: {{ .Values.images.pullSecrets | first }}
            - name: INSECURE_REGISTRY
              value: {{ .Values.images.insecureRegistry | default false | quote }}
            - name: SKIP_VALIDATIONS
              value: {{ .Values.pxbackup.skipValidations | default false | quote }}
          volumeMounts:
          {{- if .Values.proxy.configSecretName }}
            - mountPath: /etc/ssl/certs/proxy-ca.pem
              subPath: proxy-ca.pem
              name: proxy-ca-volume
              readOnly: true
          {{- end }}
      volumes:
      {{- if .Values.proxy.configSecretName }}
        - name: proxy-ca-volume
          secret:
            items:
            - key: CA
              path: proxy-ca.pem
            optional: true
            secretName: {{ .Values.proxy.configSecretName }}
      {{- end }}
      {{- if .Values.images.pullSecrets }}
      imagePullSecrets:
        {{- range $sec := .Values.images.pullSecrets }}
        - name: {{ $sec | quote }}
        {{- end }}
      {{- end }}
      restartPolicy: Never
      {{- with .Values.tolerations }}
      tolerations:
      {{- toYaml . | nindent 8 }}
      {{- end }}
  backoffLimit: 0
  {{- end}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: px-backup-pre-setup-clusterrole
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    name: pxcentral-pre-setup-hook
    app.kubernetes.io/component: pxcentral-pre-setup-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
rules:
  - apiGroups: [ "storage.k8s.io" ]
    resources: [ "storageclasses" ]
    verbs: [ "get", "list", "watch" ]
  - apiGroups: [ "" ]
    resources: [ "namespaces" ]
    verbs: [ "get" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: px-backup-pre-setup-clusterrolebinding
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    name: pxcentral-pre-setup-hook
    app.kubernetes.io/component: pxcentral-pre-setup-hook
{{- include "px-central.partOfLabel" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: px-backup-pre-setup-clusterrole
  apiGroup: rbac.authorization.k8s.io
