kind: StorageCluster
apiVersion: core.libopenstorage.org/v1
metadata:
  name: "mycluster"
  namespace: portworx
  annotations:
  labels:
    heritage: "Helm"
    release: "my-release"
    app.kubernetes.io/managed-by: "Helm"
    app.kubernetes.io/instance: "my-release"
spec:
  image: portworx/oci-monitor:3.6.0
  imagePullPolicy: Always

  kvdb:
    internal: true
    enableTLS: true
  certManager:
    enabled: true
  storage:
    useAll: true
  secretsProvider: k8s
  
  stork:
    enabled: true
  monitoring:
    telemetry:
      enabled: true
      metricsCollector:
        enabled: true
  csi:
    enabled: true
  autopilot:
    enabled: true
  purePlatform:
    fusion:
      enabled: true
      image: portworx/fusion:2.0.0
  clusterDiags:
    enabled: true

