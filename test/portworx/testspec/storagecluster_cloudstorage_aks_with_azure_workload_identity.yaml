kind: StorageCluster
apiVersion: core.libopenstorage.org/v1
metadata:
  name: "mycluster"
  namespace: portworx
  annotations:
    portworx.io/is-aks: "true"
  labels:
    heritage: "Helm"
    release: "my-release"
    app.kubernetes.io/managed-by: "Helm"
    app.kubernetes.io/instance: "my-release"
spec:
  image: portworx/oci-monitor:3.6.1
  imagePullPolicy: Always

  kvdb:
    internal: true
    enableTLS: true
  cloudStorage:
    provider: azure
    deviceSpecs:
      - type=Premium_LRS,size=150
    kvdbDeviceSpec: type=node-kvdb
    systemMetadataDeviceSpec: type=gp2,size=100
    journalDeviceSpec: type=journal
    initialStorageNodes: 1
    maxStorageNodes: 1
  secretsProvider: k8s

  certManager:
    enabled: true

  stork:
    enabled: true
  monitoring:
    telemetry:
      enabled: true
      metricsCollector:
        enabled: true
  csi:
    enabled: true
  autopilot:
    enabled: true
  clusterDiags:
    enabled: true
  workloadIdentity:
    credentials:
    - cloudProvider: "azure"
      key: "azure.workload.identity/client-id"
      value: "00000000-0000-0000-0000-000000000000"
