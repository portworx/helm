kind: StorageCluster
apiVersion: core.libopenstorage.org/v1
metadata:
  name: "px-cluster-7c1c3e56-ccba-498b-b455-a2ac2a5e0bad"
  namespace: portworx
  annotations:
    portworx.io/is-vks: "true"
    portworx.io/misc-args: "-T px-storev2"
  labels:
    heritage: "Helm"
    release: "my-release"
    app.kubernetes.io/managed-by: "Helm"
    app.kubernetes.io/instance: "my-release"
spec:
  image: portworx/oci-monitor:3.6.1
  imagePullPolicy: Always

  kvdb:
    internal: true
    enableTLS: true
  certManager:
    enabled: true
  cloudStorage:
    deviceSpecs:
      - sc=test-sc,size=150
    systemMetadataDeviceSpec: sc=test-sc,size=64
    journalDeviceSpec: sc=test-sc,size=3
  secretsProvider: k8s

  env:
  - name: ENABLE_CSI_DRIVE
    value: "true"
  - name: PRE-EXEC
    value: "iptables -A INPUT -p tcp --match multiport --dports 9001:9020 -j ACCEPT"

  stork:
    enabled: true
    args:
      webhook-controller: "true"
  monitoring:
    prometheus:
      enabled: true
      exportMetrics: true
      replicas: 1
      retention: "24h"
    telemetry:
      enabled: true
      metricsCollector:
        enabled: true
  csi:
    enabled: true
  autopilot:
    enabled: true
  runtimeOptions:
    default-io-profile: "6"
  clusterDiags:
    enabled: true
