kind: StorageCluster
apiVersion: core.libopenstorage.org/v1
metadata:
  name: "mycluster"
  namespace: portworx
  annotations:
  labels:
    heritage: "Helm"
    release: "my-release"
    app.kubernetes.io/managed-by: "Helm"
    app.kubernetes.io/instance: "my-release"
spec:
  image: portworx/oci-monitor:3.6.0
  imagePullPolicy: Always

  kvdb:
    internal: true
    enableTLS: true
  storage:
    useAll: true
  secretsProvider: k8s

  certManager:
    enabled: true
  stork:
    enabled: true
  monitoring:
    telemetry:
      enabled: true
      metricsCollector:
        enabled: true
  csi:
    enabled: true
  autopilot:
    enabled: true
  clusterDiags:
    enabled: true

  ocpDynamicPlugin:
    cacheAgentImage: portworx/cache-agent:1.0.0
    pluginImage: portworx/ocp-plugin:2.0.0

