kind: StorageCluster
apiVersion: core.libopenstorage.org/v1
metadata:
  name: "mycluster"
  namespace: portworx
  annotations:
  labels:
    heritage: "Helm"
    release: "my-release"
    app.kubernetes.io/managed-by: "Helm"
    app.kubernetes.io/instance: "my-release"
spec:
  image: portworx/oci-monitor:3.6.0
  imagePullPolicy: Always

  kvdb:
    internal: true
    enableTLS: true
  storage:
    useAll: true
  secretsProvider: k8s
  
  certManager:
    enabled: true
  
  stork:
    enabled: true
  monitoring:
    telemetry:
      enabled: true
      metricsCollector:
        enabled: true
  csi:
    enabled: true
  autopilot:
    enabled: true
  clusterDiags:
    enabled: true

  pxfslibsUpdate:
    enabled: true
    onDemandTrigger: 2026-02-09T12:00:00Z
    autoDelete: true
    schedule: 0 2 * * *

  clusterDiags:
    enabled: true
