{{- if .Values.cronWriter.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-writer
  namespace: {{ include "pg.instance" . }}
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: writer
spec:
  schedule: {{ .Values.cronWriter.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 60
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          labels:
            {{- include "pg.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: writer
        spec:
          restartPolicy: OnFailure
          containers:
            - name: writer
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              envFrom:
                - secretRef:
                    name: postgres-secret
              env:
                - name: PGHOST
                  value: "postgres.{{ include "pg.instance" . }}.svc.cluster.local"
                - name: PGPORT
                  value: "5432"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  export PGPASSWORD="$POSTGRES_PASSWORD"
                  psql -h "$PGHOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -v ON_ERROR_STOP=1 -c \
                    "INSERT INTO events (pod_name, source, message)
                     VALUES ('cron-writer', 'CronJob', 'periodic write at ' || NOW()::text);"
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
{{- end }}
