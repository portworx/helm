apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: {{ include "pg.instance" . }}
  labels:
    {{- include "pg.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: {{ include "pg.instance" . }}
  labels:
    {{- include "pg.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow
  namespace: {{ include "pg.instance" . }}
  labels:
    {{- include "pg.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pg.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ include "pg.instance" . }}
      ports:
        - protocol: TCP
          port: 5432
---
{{- if .Values.adminer.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: adminer-allow
  namespace: {{ include "pg.instance" . }}
  labels:
    app.kubernetes.io/name: adminer
    app.kubernetes.io/instance: {{ include "pg.instance" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: adminer
      app.kubernetes.io/instance: {{ include "pg.instance" . }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
