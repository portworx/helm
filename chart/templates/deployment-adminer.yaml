{{- if .Values.adminer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: {{ include "pg.instance" . }}
  labels:
    app.kubernetes.io/name: adminer
    app.kubernetes.io/instance: {{ include "pg.instance" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: adminer
      app.kubernetes.io/instance: {{ include "pg.instance" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adminer
        app.kubernetes.io/instance: {{ include "pg.instance" . }}
    spec:
      containers:
        - name: adminer
          image: "{{ .Values.adminer.image.repository }}:{{ .Values.adminer.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ADMINER_DEFAULT_SERVER
              value: "postgres.{{ include "pg.instance" . }}.svc.cluster.local"
            - name: ADMINER_DESIGN
              value: nette
          readinessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.adminer.resources | nindent 12 }}
{{- end }}
